<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PL-CM-1.25</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

  <!-- ── Project config — only thing to change per sprint ── -->
  <script>
    const CONFIG = {
      owner:           'hpembridge',
      repo:            'PL-JM-1.25',
      title:           'PL-JM-1.25',
      eyebrow:         'Job Management',
      sprintTrackerUrl:'https://hpembridge.github.io/Sprint-Tracker/',
    };
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1d23;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1d23;
      color: #fff;
      padding: 32px 48px 28px;
    }
    .header-inner { max-width: 900px; margin: auto; }

    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #7b8fa6;
      margin-bottom: 6px;
    }
    header h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -.3px;
      margin-bottom: 20px;
    }

    .quick-links { display: flex; gap: 10px; }
    .quick-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: #7b8fa6;
      text-decoration: none;
      padding: 6px 12px;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 6px;
      transition: color .15s, border-color .15s;
    }
    .quick-link:hover { color: #c8d4e0; border-color: rgba(255,255,255,.2); }

    main {
      flex: 1;
      padding: 40px 48px;
      max-width: 996px;
      margin: auto;
      width: 100%;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #8e9aab;
      padding-bottom: 4px;
      border-bottom: 1px solid #dde2ea;
      margin-bottom: 16px;
    }

    /* Dev Notes */
    .notes-section { margin-bottom: 36px; }
    .notes-list { display: flex; flex-direction: column; gap: 8px; }
    .notes-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border: 1px solid #dde2ea;
      border-radius: 8px;
      padding: 12px 16px;
    }
    .notes-row-label {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      color: #4b5563;
    }
    .notes-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      color: #6366f1;
      background: #eef2ff;
      border: none;
      border-radius: 5px;
      padding: 5px 10px;
      cursor: pointer;
      transition: background .15s;
      letter-spacing: .02em;
      white-space: nowrap;
    }
    .notes-btn:hover { background: #e0e7ff; }

    /* Prototype cards */
    .card-grid { display: flex; flex-direction: column; gap: 10px; }
    .card {
      background: #fff;
      border-radius: 10px;
      border: 1px solid #dde2ea;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      transition: box-shadow .15s, transform .15s;
    }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); transform: translateY(-1px); }
    .card h2 { font-size: 14px; font-weight: 600; flex: 1; }
    .card-arrow { font-size: 12px; color: #9aa3b0; }

    .status-msg { font-size: 13px; color: #8e9aab; }

    /* Flyout */
    .flyout-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.35);
      z-index: 100;
      backdrop-filter: blur(2px);
    }
    .flyout-overlay.open { display: block; }
    .flyout-panel {
      position: fixed;
      top: 0;
      right: -520px;
      width: 480px;
      max-width: 94vw;
      height: 100%;
      background: #fff;
      box-shadow: -4px 0 32px rgba(0,0,0,.12);
      z-index: 101;
      display: flex;
      flex-direction: column;
      transition: right .28s cubic-bezier(.4,0,.2,1);
      overflow: hidden;
    }
    .flyout-panel.open { right: 0; }
    .flyout-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid #edf0f4;
      flex-shrink: 0;
    }
    .flyout-title { font-size: 14px; font-weight: 700; color: #1a1d23; }
    .flyout-subtitle { font-size: 11px; color: #8e9aab; margin-top: 2px; }
    .flyout-close {
      background: none;
      border: none;
      font-size: 16px;
      color: #8e9aab;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: color .15s;
    }
    .flyout-close:hover { color: #1a1d23; }
    .flyout-body { flex: 1; overflow-y: auto; padding: 24px; }

    /* Markdown in flyout */
    .flyout-body h1, .flyout-body h2, .flyout-body h3 {
      font-weight: 700; margin: 0 0 10px; color: #1a1d23; line-height: 1.3;
    }
    .flyout-body h1 { font-size: 18px; }
    .flyout-body h2 { font-size: 15px; margin-top: 24px; }
    .flyout-body h3 { font-size: 13px; margin-top: 20px; color: #4b5563; }
    .flyout-body p  { font-size: 13px; line-height: 1.65; color: #374151; margin-bottom: 12px; }
    .flyout-body ul, .flyout-body ol {
      font-size: 13px; line-height: 1.65; color: #374151;
      padding-left: 18px; margin-bottom: 12px;
    }
    .flyout-body li { margin-bottom: 4px; }
    .flyout-body code {
      font-family: "SF Mono", Menlo, monospace; font-size: 12px;
      background: #f3f4f6; border-radius: 4px; padding: 1px 5px; color: #6366f1;
    }
    .flyout-body pre {
      background: #f3f4f6; border-radius: 6px; padding: 14px;
      overflow-x: auto; margin-bottom: 12px;
    }
    .flyout-body pre code { background: none; padding: 0; color: #1a1d23; }
    .flyout-body blockquote {
      border-left: 3px solid #dde2ea; padding-left: 12px;
      color: #6b7280; margin: 0 0 12px;
    }
    .flyout-body hr { border: none; border-top: 1px solid #edf0f4; margin: 20px 0; }
    .flyout-body strong { font-weight: 700; color: #1a1d23; }
    .flyout-body a { color: #6366f1; text-decoration: underline; }

    footer {
      text-align: center;
      font-size: 12px;
      color: #9aa3b0;
      padding: 20px 48px;
      border-top: 1px solid #dde2ea;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="eyebrow" id="hEyebrow"></div>
      <h1 id="hTitle"></h1>
      <div class="quick-links">
        <a class="quick-link" id="lTracker" href="#" target="_blank">
          <i class="fa-solid fa-chart-gantt"></i> Sprint Tracker
        </a>
        <a class="quick-link" id="lGithub" href="#" target="_blank">
          <i class="fa-brands fa-github"></i> Project Files
        </a>
      </div>
    </div>
  </header>

  <main>
    <div class="notes-section" id="notesSection" style="display:none">
      <div class="section-label">Dev Notes</div>
      <div class="notes-list" id="notesList"></div>
    </div>

    <div class="section-label">Prototypes</div>
    <div class="card-grid" id="cardGrid">
      <span class="status-msg">Loading…</span>
    </div>
  </main>

  <footer id="footerText"></footer>

  <!-- Flyout -->
  <div class="flyout-overlay" id="flyoutOverlay" onclick="closeFlyout()"></div>
  <div class="flyout-panel" id="flyoutPanel">
    <div class="flyout-header">
      <div>
        <div class="flyout-title" id="flyoutTitle"></div>
        <div class="flyout-subtitle" id="flyoutSubtitle"></div>
      </div>
      <button class="flyout-close" onclick="closeFlyout()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="flyout-body" id="flyoutBody"></div>
  </div>

  <script>
    // ── Apply static config ──
    document.title                          = CONFIG.title;
    document.getElementById('hEyebrow').textContent  = CONFIG.eyebrow;
    document.getElementById('hTitle').textContent    = CONFIG.title;
    document.getElementById('footerText').textContent = CONFIG.title + ' · Cleveland Menu Co.';
    document.getElementById('lTracker').href = CONFIG.sprintTrackerUrl;
    document.getElementById('lGithub').href  = `https://github.com/${CONFIG.owner}/${CONFIG.repo}`;
    document.getElementById('flyoutSubtitle').textContent = CONFIG.title + ' · Dev Notes';

    // ── Utilities ──
    function toTitle(str) {
      return str
        .replace(/\.[^.]+$/, '')
        .replace(/^notes-/, '')
        .split('-')
        .map(w => w.charAt(0).toUpperCase() + w.slice(1))
        .join(' ');
    }

    async function fetchTitle(filename) {
      try {
        const r = await fetch(filename);
        const text = await r.text();
        const m = text.match(/<title[^>]*>(.*?)<\/title>/i);
        return (m && m[1].trim()) || toTitle(filename);
      } catch {
        return toTitle(filename);
      }
    }

    // ── Main build ──
    async function build() {
      const res = await fetch(
        `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/`
      );
      if (!res.ok) throw new Error(`GitHub API ${res.status}`);
      const files = await res.json();

      const htmlFiles  = files.filter(f => f.type === 'file' && f.name.endsWith('.html') && f.name !== 'index.html').map(f => f.name);
      const notesFiles = files.filter(f => f.type === 'file' && f.name.startsWith('notes-') && f.name.endsWith('.md')).map(f => f.name);

      // Build prototype cards
      const grid = document.getElementById('cardGrid');
      grid.innerHTML = '';

      if (htmlFiles.length === 0) {
        grid.innerHTML = '<span class="status-msg">No prototype files found.</span>';
      } else {
        const entries = await Promise.all(
          htmlFiles.map(async name => ({ name, title: await fetchTitle(name) }))
        );
        entries.forEach(({ name, title }) => {
          const a = document.createElement('a');
          a.className = 'card';
          a.href = name;
          a.innerHTML = `<h2>${title}</h2><i class="fa-solid fa-arrow-right card-arrow"></i>`;
          grid.appendChild(a);
        });
      }

      // Build notes rows
      if (notesFiles.length > 0) {
        const section = document.getElementById('notesSection');
        const list    = document.getElementById('notesList');
        section.style.display = '';
        notesFiles.forEach(name => {
          const label = toTitle(name);
          const row = document.createElement('div');
          row.className = 'notes-row';
          row.innerHTML = `
            <span class="notes-row-label">${label}</span>
            <button class="notes-btn" onclick="openFlyout('${name}','${label}')">
              <i class="fa-solid fa-book-open"></i> View Notes
            </button>`;
          list.appendChild(row);
        });
      }
    }

    build().catch(() => {
      document.getElementById('cardGrid').innerHTML =
        '<span class="status-msg">Could not load files. This page must be served over HTTP with access to the GitHub API.</span>';
    });

    // ── Flyout ──
    function openFlyout(file, label) {
      document.getElementById('flyoutTitle').textContent = label;
      document.getElementById('flyoutBody').innerHTML = '<p style="color:#8e9aab;font-size:13px">Loading…</p>';
      document.getElementById('flyoutOverlay').classList.add('open');
      document.getElementById('flyoutPanel').classList.add('open');
      document.body.style.overflow = 'hidden';
      fetch(file)
        .then(r => r.text())
        .then(md => { document.getElementById('flyoutBody').innerHTML = marked.parse(md); })
        .catch(() => { document.getElementById('flyoutBody').innerHTML = '<p style="color:#8e9aab;font-size:13px">Could not load notes.</p>'; });
    }

    function closeFlyout() {
      document.getElementById('flyoutOverlay').classList.remove('open');
      document.getElementById('flyoutPanel').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeFlyout(); });
  </script>

</body>
</html>
